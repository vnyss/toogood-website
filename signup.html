<!-- Auth section starts -->
<main class="auth-page">
    <div class="auth-card">

        <p class="auth-tag">NEW SPECIMEN // INTAKE</p>
        <h1 class="auth-title">Begin your arc</h1>
        <p class="auth-subtitle">Open a record. Every change starts somewhere.</p>

        <form class="auth-form" id="signupForm" novalidate>

            <div class="field-group">
                <label for="username">Subject ID</label>
                <input type="text" id="username" name="username" placeholder="choose a username" required autofocus>
                <span class="field-hint">3–20 characters, letters, numbers, or underscore</span>
            </div>

            <div class="field-group">
                <label for="password">Passphrase</label>
                <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required>
                <span class="field-hint">8 characters minimum</span>
            </div>

            <div class="field-group">
                <label for="confirm_password">Confirm passphrase</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" minlength="8" required>
            </div>

            <p id="signupError" style="color:#cf6679;font-size:13px;margin-bottom:12px;display:none;"></p>

            <button type="submit" class="auth-submit" id="signupBtn">Create account</button>

        </form>

        <p class="auth-switch">Already better<a href="./login.html">Begin</a></p>

    </div>
</main>
<!-- Auth section ends -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const APP_URL = 'https://visionary-palmier-db40fb.netlify.app';
  const API_URL = 'https://metabollism.onrender.com';

  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    const err = document.getElementById('signupError');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm_password').value;

    err.style.display = 'none';

    if (password !== confirm) {
      err.textContent = 'Passphrases do not match.';
      err.style.display = 'block';
      return;
    }

    btn.textContent = 'Creating account…';
    btn.disabled = true;

    try {
      const res = await fetch(API_URL + '/api/v1/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (data.ok) {
        // Auto-login after register
        const loginRes = await fetch(API_URL + '/api/v1/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const loginData = await loginRes.json();
        if (loginData.token) {
          localStorage.setItem('tg_token', loginData.token);
          localStorage.setItem('tg_user', username);
        }
        window.location.href = APP_URL;
      } else {
        err.textContent = data.error || 'Could not create account.';
        err.style.display = 'block';
        btn.textContent = 'Create account';
        btn.disabled = false;
      }
    } catch {
      err.textContent = 'Could not reach server. Try again.';
      err.style.display = 'block';
      btn.textContent = 'Create account';
      btn.disabled = false;
    }
  });
</script>
