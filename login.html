<!-- Auth section starts -->
<main class="auth-page">
    <div class="auth-card">

        <p class="auth-tag">ENTRY LOG // ACCESS</p>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">The body remembers. Sign back in to continue being better.</p>

        <form class="auth-form" id="loginForm" novalidate>

            <div class="field-group">
                <label for="username">Subject ID</label>
                <input type="text" id="username" name="username" placeholder="USERNAME" required autofocus>
            </div>

            <div class="field-group">
                <label for="password">Passphrase</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <p id="loginError" style="color:#cf6679;font-size:13px;margin-bottom:12px;display:none;"></p>

            <button type="submit" class="auth-submit" id="loginBtn">Log in</button>

        </form>

        <p class="auth-switch">No record on file? <a href="./signup.html">Create one</a></p>

    </div>
</main>
<!-- Auth section ends -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_URL = 'http://localhost:5000';

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.textContent = 'Logging in…';
    btn.disabled = true;
    err.style.display = 'none';

    try {
      const res = await fetch(API_URL + '/api/v1/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (data.ok && data.token) {
        // Store token so the app picks it up, then redirect
        localStorage.setItem('tg_token', data.token);
        localStorage.setItem('tg_user', username);
        window.location.href = 'index.html';
      } else {
        err.textContent = data.error || 'Invalid username or password.';
        err.style.display = 'block';
        btn.textContent = 'Log in';
        btn.disabled = false;
      }
    } catch {
      err.textContent = 'Could not reach server. Try again.';
      err.style.display = 'block';
      btn.textContent = 'Log in';
      btn.disabled = false;
    }
  });
</script>

</body>
